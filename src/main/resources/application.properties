spring.application.name=PiattaformaMusicale
server.port=8081

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/piattaformamusicale?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Limiti di dimensione per i file
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
