<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestione Utenti</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <span class="logo">Gestione Utenti</span>
    <div class="nav-links">
        <button class="theme-toggle" onclick="toggleTheme()" title="Cambia Tema">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <a href="/admin/panel">Torna al Pannello</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0;">Lista Utenti Registrati</h2>
            <a href="/admin/utenti/new" class="btn btn-success">+ Aggiungi Utente</a>
        </div>
        <div th:if="${param.error}" class="alert alert-error" style="color: red; margin-bottom: 10px;">
            Errore: <span th:text="${param.error}"></span>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Ruolo</th>
                <th>Azioni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${utenti}">
                <td th:text="${u.id}">1</td>
                <td th:text="${u.username}" style="font-weight: bold;">User</td>
                <td th:text="${u.email}">mail@test.com</td>
                <td>
                        <span th:text="${u.ruolo}"
                              th:style="${u.ruolo.name() == 'SUPER_ADMIN' ? 'color: #e74c3c; font-weight: bold;' : 'color: #27ae60;'}">
                        </span>
                </td>
                <td>
                    <form th:if="${u.ruolo.name() != 'SUPER_ADMIN'}"
                          th:action="@{/admin/utenti/delete/{id}(id=${u.id})}" method="post"
                          onsubmit="return confirm('Sei sicuro di voler eliminare questo utente?');">
                        <button type="submit" class="btn btn-sm btn-danger">Elimina</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;
    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
        if(themeIcon) { themeIcon.classList.remove('fa-moon'); themeIcon.classList.add('fa-sun'); }
    }
    function toggleTheme() {
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
            localStorage.setItem('theme', 'dark');
            if(themeIcon) { themeIcon.classList.remove('fa-moon'); themeIcon.classList.add('fa-sun'); }
        } else {
            localStorage.setItem('theme', 'light');
            if(themeIcon) { themeIcon.classList.remove('fa-sun'); themeIcon.classList.add('fa-moon'); }
        }
    }
</script>

</body>
</html>
